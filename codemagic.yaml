workflows:
  ios_ipa:
    name: iOS IPA (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      node: 22
      vars:
        # Capacitor app id (also used as Bundle ID).
        BUNDLE_ID: "com.ojtify.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      groups:
        # Create this group in Codemagic UI and put your secrets there (mark as Secret).
        # Required for automatic signing:
        # - APP_STORE_CONNECT_KEY_IDENTIFIER
        # - APP_STORE_CONNECT_ISSUER_ID
        # - APP_STORE_CONNECT_PRIVATE_KEY
        # - CERTIFICATE_PRIVATE_KEY
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web (mobile)
        script: |
          npm run build:mobile
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch signing files (Automatic signing)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    # Optional: upload to TestFlight (requires App Store Connect integration).
    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true
