workflows:
  ios_ipa:
    name: iOS IPA (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      node: 22
      ios_signing:
        # For TestFlight/App Store: app_store
        # For third-party distribution (needs device UDIDs): ad_hoc
        distribution_type: app_store
        bundle_identifier: "com.ojtify.app"
      vars:
        # Capacitor app id (also used as Bundle ID).
        BUNDLE_ID: "com.ojtify.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      groups:
        # Create this group in Codemagic UI and put your secrets there.
        # See docs for required variables if you use the "fetch-signing-files" approach.
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web (mobile)
        script: |
          npm run build:mobile
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      # If you're using uploaded signing files + `ios_signing` above, the next step is enough.
      # If you're using automatic signing via App Store Connect API keys, you can instead use:
      #   keychain initialize
      #   app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      #   keychain add-certificates
      - name: Set up code signing on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    # Optional: upload to TestFlight (requires App Store Connect integration).
    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true
