services:
  - type: web
    name: ojtify
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: DATABASE_PATH
        value: /var/data/ojtify.db
    disk:
      name: ojtify-data
      mountPath: /var/data
      sizeGB: 1
